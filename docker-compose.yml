# Prod stack: pull the published image, run migrations once, then run the bot.
#
#   IMAGE_TAG=1.2.3 docker compose up   # migrate runs to completion, then bot starts
#
# The image is built and pushed to Docker Hub by CI (.github/workflows/release.yml)
# on a vX.X.X tag; this stack only pulls it. migrate and bot share ONE image (the
# same pulled tag) so both run the identical binary.

# Shared image reference. IMAGE_TAG selects which published tag to run (e.g.
# IMAGE_TAG=1.2.3), defaulting to latest. pull_policy: always re-fetches the tag on
# `up` so a redeploy (especially of latest) picks up the freshest image.
x-bot-image: &bot-image
  image: kweezls/spacecraft-corp:${IMAGE_TAG:-latest}
  pull_policy: always

# Shared runtime env. migrate only needs the DB settings; bot needs all of them.
# Kept in one block for simplicity (the unused token is harmless to migrate).
x-bot-env: &bot-env
  # The app assembles its DSN from these POSTGRES_* parts (db.Config.DSN); host is
  # the `postgres` service, port is the in-network 5432.
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: ${POSTGRES_USER:-bot}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bot}
  POSTGRES_DB: ${POSTGRES_DB:-spacecraft}
  POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
  # Safer for prod: mount the password as a file instead of POSTGRES_PASSWORD.
  # Comment out POSTGRES_PASSWORD, uncomment the line + the secrets blocks below,
  # and put the password in ./secrets/postgres_password (file wins).
  # POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
  BOT_TOKEN: ${BOT_TOKEN:?set BOT_TOKEN}
  # Safer for prod: mount the token as a file instead of the env var above.
  # Comment out BOT_TOKEN, uncomment the line + the secrets blocks below, and
  # put the token in ./secrets/bot_token.
  # BOT_TOKEN_FILE: /run/secrets/bot_token
  APPROVED_SERVER_ID: ${APPROVED_SERVER_ID:-}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  APP_NAME: ${APP_NAME:-spacecraft-corporation}
  APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
  APP_OWNER_DISCORD_ID: ${APP_OWNER_DISCORD_ID:-}
  # `-` (not `:-`) so an explicit empty FEATURES= passes through as "no features";
  # only a genuinely unset FEATURES falls back to the `ping` default.
  FEATURES: ${FEATURES-ping}
  INSTRUMENTATION_ADDR: ${INSTRUMENTATION_ADDR:-:9464}
  # contracts feature tunables (only read when "contracts" is in FEATURES). Mapped
  # explicitly — the anchor is an allowlist, so an unmapped var never reaches the
  # container and the code default silently wins.
  CONTRACTS_SWEEP_INTERVAL: ${CONTRACTS_SWEEP_INTERVAL:-1m}
  CONTRACTS_EXPIRES_NOTIFY: ${CONTRACTS_EXPIRES_NOTIFY:-1h}
  CONTRACTS_MAX_ITEMS: ${CONTRACTS_MAX_ITEMS:-25}
  CONTRACTS_LIST_PAGE_SIZE: ${CONTRACTS_LIST_PAGE_SIZE:-8}
  # bases feature tunables (only read when "bases" is in FEATURES).
  BASES_MEMBER_LIMIT: ${BASES_MEMBER_LIMIT:-3}
  BASES_CORP_LIMIT: ${BASES_CORP_LIMIT:-6}
  BASES_EXTRACTOR_LIMIT: ${BASES_EXTRACTOR_LIMIT:-4}
  BASES_PRODUCTION_LIMIT: ${BASES_PRODUCTION_LIMIT:-30}
  BASES_LIST_PAGE_SIZE: ${BASES_LIST_PAGE_SIZE:-8}
  # outbox worker (core; always loaded).
  OUTBOX_POLL_INTERVAL: ${OUTBOX_POLL_INTERVAL:-3s}
  OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-20}
  OUTBOX_MAX_ATTEMPTS: ${OUTBOX_MAX_ATTEMPTS:-10}
  OUTBOX_CLEANUP_INTERVAL: ${OUTBOX_CLEANUP_INTERVAL:-1h}
  OUTBOX_DONE_RETENTION: ${OUTBOX_DONE_RETENTION:-72h}
  OUTBOX_FAILED_RETENTION: ${OUTBOX_FAILED_RETENTION:-240h}

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-16}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bot}
      POSTGRES_DB: ${POSTGRES_DB:-spacecraft}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # -d targets the real database; without it pg_isready defaults to a DB
      # named after the user ("bot"), which doesn't exist and spams Postgres logs
      # with FATAL on every probe (the check still passes either way).
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bot} -d ${POSTGRES_DB:-spacecraft}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot migrations: applies the schema with `--migrate`, then exits 0.
  # The bot waits for this to complete before it starts (see depends_on below).
  migrate:
    <<: *bot-image
    environment:
      <<: *bot-env
    command: ["--migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    <<: *bot-image
    environment:
      <<: *bot-env
    expose:
      - "9464"   # ops: /healthz /readyz /metrics
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:

# secrets:
#   bot_token:
#     file: ./secrets/bot_token   # gitignored; or use `external: true`
#   postgres_password:
#     file: ./secrets/postgres_password   # gitignored; or use `external: true`
