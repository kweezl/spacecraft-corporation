services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bot}
      POSTGRES_DB: ${POSTGRES_DB:-spacecraft}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      target: prod
      args:
        VERSION: ${VERSION:-0.0.0-unspecified}
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bot}:${POSTGRES_PASSWORD:-bot}@postgres:5432/${POSTGRES_DB:-spacecraft}?sslmode=disable
      # Safer for prod: mount the DSN (it embeds the password) as a file instead
      # of the env var above. Comment out DATABASE_URL, uncomment the line + the
      # secrets blocks below, and put the connection string in ./secrets/database_url.
      # DATABASE_URL_FILE: /run/secrets/database_url
      BOT_TOKEN: ${BOT_TOKEN:?set BOT_TOKEN}
      # Safer for prod: mount the token as a file instead of the env var above.
      # Comment out BOT_TOKEN, uncomment the line + the secrets blocks below, and
      # put the token in ./secrets/bot_token.
      # BOT_TOKEN_FILE: /run/secrets/bot_token
      COMMAND_SCOPE: ${COMMAND_SCOPE:-server}
      DEV_SERVER_ID: ${DEV_SERVER_ID:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_NAME: ${APP_NAME:-spacecraft-corporation}
      FEATURES: ${FEATURES:-ping}
      HEALTH_ADDR: ${HEALTH_ADDR:-:9464}
    # secrets:
    #   - bot_token
    #   - database_url
    expose:
      - "9464"   # ops: /healthz /readyz /metrics
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:

# secrets:
#   bot_token:
#     file: ./secrets/bot_token   # gitignored; or use `external: true`
#   database_url:
#     file: ./secrets/database_url   # gitignored; or use `external: true`
