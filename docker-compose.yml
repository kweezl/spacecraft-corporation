services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: spacecraft
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      target: prod
      args:
        VERSION: ${VERSION:-0.0.0-unspecified}
    environment:
      DATABASE_URL: postgres://bot:bot@postgres:5432/spacecraft?sslmode=disable
      BOT_TOKEN: ${BOT_TOKEN:?set BOT_TOKEN}
      COMMAND_SCOPE: ${COMMAND_SCOPE:-server}
      DEV_SERVER_ID: ${DEV_SERVER_ID:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_NAME: ${APP_NAME:-spacecraft-cadet}
      FEATURES: ${FEATURES:-ping}
      HEALTH_ADDR: ${HEALTH_ADDR:-:8080}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
