# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit configuration — https://docs.coderabbit.ai/getting-started/configure-coderabbit
language: en-US
tone_instructions: >-
  Be concise and direct. This is a Go project using uber-go/fx modules,
  pgx/pgxpool, goose migrations, and discordgo. Favor idiomatic Go, TDD, and the
  decentralized per-module config conventions in CLAUDE.md.

reviews:
  # "chill" = fewer, higher-signal comments; "assertive" = more thorough/nitpicky.
  # Assertive surfaces minor style + edge cases too; noise is triaged by the maintainer.
  profile: assertive
  # Advisory only: comments, never a blocking "changes requested" review (solo repo).
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    # Only review PRs targeting these branches (regex, not glob).
    base_branches:
      - main
      - release/.*
  # Pull project conventions into review context.
  path_instructions:
    - path: "**/*.go"
      instructions: >-
        Follow the conventions in CLAUDE.md. Every feature is an fx.Module with
        a Module() fx.Option in its own module.go and logger.Decorate("<name>").
        Handlers must reply via registry.Responder, never touch
        *discordgo.Session directly. Use "server" for the domain term, mapping
        discordgo's guild fields at the boundary. Tests are TDD with
        testify + mockery mocks. Secrets (BOT_TOKEN, POSTGRES_PASSWORD) must never
        be logged or committed.
    - path: "internal/migrator/migrations/*.sql"
      instructions: >-
        Goose migrations are embedded via embed.FS and applied by the migrator
        module only in one-shot --migrate mode (never on bot startup). Scaffold
        via goose with a timestamped name; one CREATE TABLE per file. Ensure each
        migration has matching up/down sections. New tables use app-supplied
        UUIDv7 PKs and app-supplied TIMESTAMP (no DEFAULT) columns; servers_id is
        a UUID FK to servers.id, not the Discord snowflake.
  tools:
    # Reuse the repo's existing golangci-lint config (.golangci.yml).
    golangci-lint:
      enabled: true
    # Secret scanning — the repo handles BOT_TOKEN / POSTGRES_PASSWORD.
    gitleaks:
      enabled: true
    # Dockerfile best-practices (multi-stage build/prod/dev targets).
    hadolint:
      enabled: true
    # GitHub Actions workflow linting (.github/workflows/*.yml).
    actionlint:
      enabled: true
    # YAML hygiene (compose files, workflows, this config).
    yamllint:
      enabled: true
    # Markdown lint (README.md, CLAUDE.md).
    markdownlint:
      enabled: true
    # Lightweight SAST across the tree.
    semgrep:
      enabled: true

chat:
  auto_reply: true