name: Checks

# Reusable test + lint suite, called by both ci.yml (on push/PR) and release.yml
# (gating the Docker publish). Defined once here so the two callers can't drift.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bot
          POSTGRES_PASSWORD: bot
          POSTGRES_DB: spacecraft_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U bot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://bot:bot@localhost:5432/spacecraft_test?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      - run: go test ./... -race

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2

  # Official Go vulnerability scanner: flags CVEs actually reachable from our
  # code (call-graph aware), not just present in go.sum like Dependabot. Reads a
  # live vuln DB, so a newly-published CVE can turn this red on an unchanged tree.
  govulncheck:
    runs-on: ubuntu-latest
    # Bound the network-dependent `go install` so a hung fetch fails fast instead
    # of stalling the release pipeline (this suite gates the Docker publish).
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # Read-only scanner: don't leave the git token in .git/config where the
        # network-fetched tool could reach it.
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  # Go SAST: hardcoded credentials, SQL injection, weak crypto, unhandled errors
  # in security-relevant spots. Deterministic over a commit.
  gosec:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      # Pinned (not @latest) so scans are deterministic — a new gosec release
      # can't newly flag existing code and redden an unrelated PR. Bump manually.
      - run: go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1
        # -exclude-generated: skip machine-emitted db/v* literals (the DO NOT EDIT
        #   files) — G101 entropy false positives on localized name/desc tables.
        # -exclude-dir internal/gamedata/gen: the build-time codegen tool is a
        #   dev/maintainer step over trusted input, never in the bot binary.
      - run: gosec -exclude-generated -exclude-dir=internal/gamedata/gen ./...
