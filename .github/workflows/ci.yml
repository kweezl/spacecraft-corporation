name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  # Test + lint live in a reusable workflow so release.yml can gate on the exact
  # same suite (see .github/workflows/checks.yml).
  checks:
    uses: ./.github/workflows/checks.yml

  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: docker build --target prod --build-arg APP_VERSION=${GITHUB_SHA::7} -t spacecraft-corporation:ci .
