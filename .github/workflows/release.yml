name: Release

# Publish the prod image to Docker Hub on a version tag. Tags must be vX.X.X;
# the image is pushed as X.X.X (the v stripped) and latest, with OCI labels.
on:
  push:
    tags: [ 'v*.*.*' ]

# Least privilege: Docker Hub auth is via DOCKERHUB_* secrets and the GHA build
# cache needs no elevated GITHUB_TOKEN, so read-only repo access is enough.
permissions:
  contents: read

# Serialize all releases (constant group, not per-ref) so two tags pushed back to
# back can't race on the latest manifest. Don't cancel an in-flight publish —
# let it finish pushing, then run the next.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Gate the publish on the same test + lint suite CI runs, so a tag on a red
  # commit fails here instead of shipping a broken image (and moving latest).
  checks:
    uses: ./.github/workflows/checks.yml

  docker:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Docker metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: kweezls/spacecraft-corporation
          # vX.X.X -> X.X.X (the v is stripped). latest is handled by flavor
          # (latest=auto) below, which is pre-release-aware: a stable vX.X.X also
          # moves latest, but a vX.X.X-rc1 tags only the rc and leaves latest put.
          tags: |
            type=semver,pattern={{version}}
          flavor: |
            latest=auto
          # type=semver already emits the org.opencontainers.image.* set
          # (source, revision, created, version, ...); enrich it with title/description.
          labels: |
            org.opencontainers.image.title=spacecraft-corporation
            org.opencontainers.image.description=Companion Discord bot for the Steam game SpaceCraft

      # QEMU emulators so Buildx can cross-build the non-native arch (arm64 on
      # the amd64 runner). The Go build is CGO-free, so emulation is only used
      # for the few RUN steps in the prod stage.
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          # Bake the bare semver into the binary (ldflags), matching the image tag.
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
